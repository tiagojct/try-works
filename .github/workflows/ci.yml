name: ci
on: [push, pull_request]

# Actions pinned to commit SHAs for supply-chain safety; the tag is in the
# comment. Keep them fresh with Dependabot (.github/dependabot.yml).
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.x"
      - name: Validate tokens, contrast, roles, scales
        run: python3 scripts/validate.py
      - name: Check generated files are in sync with the json
        run: python3 scripts/generate.py --check
      - name: Colour-vision report
        run: python3 scripts/cvd_check.py
      - name: Portuguese coverage and subset range
        run: python3 scripts/check_fonts.py

name: ci
on: [push, pull_request]

# Actions pinned to commit SHAs for supply-chain safety; the tag is in the
# comment. Keep them fresh with Dependabot (.github/dependabot.yml).
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"
      - name: Validate tokens, contrast, roles, scales
        run: python3 src/scripts/validate.py
      - name: Check generated files are in sync with the json
        run: python3 src/scripts/generate.py --check
      - name: Colour-vision report
        run: python3 src/scripts/cvd_check.py
      - name: Portuguese coverage and subset range
        run: python3 src/scripts/check_fonts.py
